<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="a-grad-ico" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79D7FF"/>
      <stop offset="60%" stop-color="#38b6ff"/>
      <stop offset="100%" stop-color="#1a6fd4"/>
    </linearGradient>
    <filter id="glow-ico" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlowIco" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#79D7FF" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A2240"/>

  <!-- Node network ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#A0B2C6" stroke-width="0.7" stroke-dasharray="3,5" opacity="0.5"/>

  <!-- Network lines -->
  <line x1="32" y1="6"  x2="55" y2="19" stroke="#A0B2C6" stroke-width="0.8" opacity="0.45"/>
  <line x1="55" y1="19" x2="55" y2="45" stroke="#A0B2C6" stroke-width="0.8" opacity="0.45"/>
  <line x1="55" y1="45" x2="32" y2="58" stroke="#A0B2C6" stroke-width="0.8" opacity="0.45"/>
  <line x1="32" y1="58" x2="9"  y2="45" stroke="#A0B2C6" stroke-width="0.8" opacity="0.45"/>
  <line x1="9"  y1="45" x2="9"  y2="19" stroke="#A0B2C6" stroke-width="0.8" opacity="0.45"/>
  <line x1="9"  y1="19" x2="32" y2="6"  stroke="#A0B2C6" stroke-width="0.8" opacity="0.45"/>
  <line x1="9"  y1="19" x2="55" y2="45" stroke="#A0B2C6" stroke-width="0.5" opacity="0.25"/>
  <line x1="55" y1="19" x2="9"  y2="45" stroke="#A0B2C6" stroke-width="0.5" opacity="0.25"/>

  <!-- Network nodes -->
  <circle cx="32" cy="6"  r="2.5" fill="#79D7FF" opacity="0.95"/>
  <circle cx="55" cy="19" r="2"   fill="#A0B2C6" opacity="0.8"/>
  <circle cx="55" cy="45" r="2"   fill="#A0B2C6" opacity="0.8"/>
  <circle cx="32" cy="58" r="2.5" fill="#79D7FF" opacity="0.8"/>
  <circle cx="9"  cy="45" r="2"   fill="#A0B2C6" opacity="0.8"/>
  <circle cx="9"  cy="19" r="2"   fill="#A0B2C6" opacity="0.8"/>

  <!-- Platonic solids -->
  <polygon points="49,13 53,17 49,21 45,17" fill="none" stroke="#79D7FF" stroke-width="0.9" opacity="0.6"/>
  <polygon points="15,41 18,44 15,47 12,44" fill="none" stroke="#79D7FF" stroke-width="0.9" opacity="0.5"/>

  <!-- Fluid "A" letterform — larger for icon -->
  <path d="M 19 52 Q 22 38, 32 12 Q 33 10, 34 12 Q 43 38, 46 52"
        fill="none" stroke="url(#a-grad-ico)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow-ico)"/>
  <!-- Crossbar -->
  <path d="M 22 38 Q 32 36, 42 38"
        fill="none" stroke="url(#a-grad-ico)" stroke-width="3.5"
        stroke-linecap="round" filter="url(#glow-ico)"/>
  <!-- Inner swirl -->
  <path d="M 30 50 Q 34 42, 32 33 Q 30 28, 34 24"
        fill="none" stroke="#79D7FF" stroke-width="1.5"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Apex glow dot -->
  <circle cx="33" cy="12" r="3.2" fill="#79D7FF" filter="url(#outerGlowIco)" opacity="1"/>
</svg>
