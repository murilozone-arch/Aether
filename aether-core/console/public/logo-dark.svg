<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <!-- Primary gradient: neon cyan to deep blue -->
    <linearGradient id="a-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79D7FF"/>
      <stop offset="60%" stop-color="#38b6ff"/>
      <stop offset="100%" stop-color="#1a6fd4"/>
    </linearGradient>
    <!-- Glow filter for the isotipo -->
    <filter id="glow-dark" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle outer glow -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#79D7FF" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === ISOTIPO: Stylised "A" with geometric node network === -->
  <g transform="translate(4, 4)">
    <!-- Outer node network ring (metallic grey lines) -->
    <circle cx="28" cy="28" r="24" fill="none" stroke="#A0B2C6" stroke-width="0.6" stroke-dasharray="3,4" opacity="0.55"/>

    <!-- Network connector lines between nodes -->
    <line x1="28" y1="4"  x2="50" y2="16" stroke="#A0B2C6" stroke-width="0.7" opacity="0.5"/>
    <line x1="50" y1="16" x2="50" y2="40" stroke="#A0B2C6" stroke-width="0.7" opacity="0.5"/>
    <line x1="50" y1="40" x2="28" y2="52" stroke="#A0B2C6" stroke-width="0.7" opacity="0.5"/>
    <line x1="28" y1="52" x2="6"  y2="40" stroke="#A0B2C6" stroke-width="0.7" opacity="0.5"/>
    <line x1="6"  y1="40" x2="6"  y2="16" stroke="#A0B2C6" stroke-width="0.7" opacity="0.5"/>
    <line x1="6"  y1="16" x2="28" y2="4"  stroke="#A0B2C6" stroke-width="0.7" opacity="0.5"/>
    <!-- Diagonal cross connectors -->
    <line x1="6"  y1="16" x2="50" y2="40" stroke="#A0B2C6" stroke-width="0.5" opacity="0.3"/>
    <line x1="50" y1="16" x2="6"  y2="40" stroke="#A0B2C6" stroke-width="0.5" opacity="0.3"/>

    <!-- Network nodes (small circles at vertices) -->
    <circle cx="28" cy="4"  r="2.2" fill="#79D7FF" opacity="0.9"/>
    <circle cx="50" cy="16" r="1.8" fill="#A0B2C6" opacity="0.8"/>
    <circle cx="50" cy="40" r="1.8" fill="#A0B2C6" opacity="0.8"/>
    <circle cx="28" cy="52" r="2.2" fill="#79D7FF" opacity="0.8"/>
    <circle cx="6"  cy="40" r="1.8" fill="#A0B2C6" opacity="0.8"/>
    <circle cx="6"  cy="16" r="1.8" fill="#A0B2C6" opacity="0.8"/>

    <!-- Small platonic solid hints (diamond shapes) -->
    <polygon points="44,10 48,14 44,18 40,14" fill="none" stroke="#79D7FF" stroke-width="0.8" opacity="0.6"/>
    <polygon points="12,36 15,39 12,42 9,39"  fill="none" stroke="#79D7FF" stroke-width="0.8" opacity="0.5"/>

    <!-- Fluid "A" letterform — organic flowing strokes -->
    <!-- Left leg of A (with subtle curve) -->
    <path d="M 17 46 Q 19 34, 28 10 Q 29 8, 30 10 Q 38 34, 40 46"
          fill="none" stroke="url(#a-grad-dark)" stroke-width="4.5"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#glow-dark)"/>
    <!-- Crossbar -->
    <path d="M 20 34 Q 28 32, 36 34"
          fill="none" stroke="url(#a-grad-dark)" stroke-width="3"
          stroke-linecap="round" filter="url(#glow-dark)"/>
    <!-- Inner energy swirl / fluid flourish -->
    <path d="M 26 44 Q 30 38, 28 30 Q 26 26, 30 22"
          fill="none" stroke="#79D7FF" stroke-width="1.5"
          stroke-linecap="round" opacity="0.55"/>

    <!-- Apex glow dot -->
    <circle cx="28.5" cy="10" r="2.8" fill="#79D7FF" filter="url(#outerGlow)" opacity="0.95"/>
  </g>

  <!-- === LOGOTYPE: AETHER in Montserrat bold === -->
  <text
    x="76" y="41"
    font-family="'Montserrat', 'Outfit', 'Inter', sans-serif"
    font-weight="800"
    font-size="26"
    fill="#ffffff"
    letter-spacing="6"
  >AETHER</text>

  <!-- Subtle accent line under text -->
  <line x1="76" y1="46" x2="292" y2="46" stroke="#79D7FF" stroke-width="0.8" opacity="0.35"/>
</svg>